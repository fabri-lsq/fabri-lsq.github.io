<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Libros — Biblioteca Virtual</title>
<link rel="icon" href="/Libro.ico" type="image/x-icon">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
  .logo-icon { width: 28px; height: 28px; object-fit: contain; }
  :root {
    --bg: #0e0e12; --surface: #16161d; --border: #2a2a38;
    --accent: #fb923c; --accent2: #f59e0b;
    --text: #e2e2f0; --muted: #6b6b8a;
    --leido: #a3e635; --card-w: 160px; --radius: 10px;
    --font-head: 'Bebas Neue', sans-serif; --font-body: 'DM Sans', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 60% 50% at 80% 20%, rgba(251,146,60,.06) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 10% 80%, rgba(245,158,11,.04) 0%, transparent 60%);
  }
  nav { position: sticky; top: 0; z-index: 100; background: rgba(14,14,18,.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 20px; height: 56px; }
  nav a.logo { display: flex; align-items: center; gap: 10px; text-decoration: none; font-family: var(--font-head); font-size: 1.5rem; letter-spacing: .05em; color: var(--text); }
  nav a.logo span { color: var(--accent); }
  .nav-links { display: flex; gap: 4px; margin-left: auto; }
  .nav-links a { text-decoration: none; color: var(--muted); font-size: .82rem; font-weight: 500; padding: 6px 14px; border-radius: 6px; transition: all .2s; letter-spacing: .03em; }
  .nav-links a:hover, .nav-links a.active { color: var(--text); background: var(--border); }
  .nav-links a.active { color: var(--accent); }
  header { position: relative; z-index: 1; padding: 48px 32px 24px; display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 20px; }
  header h1 { font-family: var(--font-head); font-size: clamp(2.8rem, 6vw, 5rem); letter-spacing: .06em; line-height: 1; color: var(--text); }
  header h1 span { color: var(--accent); }
  #stats-bar { display: flex; gap: 24px; flex-wrap: wrap; font-size: .78rem; color: var(--muted); font-weight: 300; }
  .stat { display: flex; flex-direction: column; align-items: flex-end; }
  .stat strong { font-size: 2.3rem; font-family: var(--font-head); color: var(--text); letter-spacing: .04em; }
  .controls { position: relative; z-index: 1; padding: 0 32px 24px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 340px; }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; opacity: .4; }
  #buscador { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 9px 14px 9px 38px; color: var(--text); font-family: var(--font-body); font-size: .88rem; outline: none; transition: border-color .2s; }
  #buscador:focus { border-color: var(--accent); }
  #buscador::placeholder { color: var(--muted); }
  .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip { background: var(--surface); border: 1px solid var(--border); color: var(--muted); font-family: var(--font-body); font-size: .78rem; font-weight: 500; padding: 7px 16px; border-radius: 100px; cursor: pointer; transition: all .2s; white-space: nowrap; letter-spacing: .02em; }
  .chip:hover { border-color: var(--accent); color: var(--text); }
  .chip.active { background: var(--accent); border-color: var(--accent); color: #000; }
  .btn-admin { margin-left: auto; background: transparent; border: 1px solid var(--accent); color: var(--accent); font-family: var(--font-body); font-size: .78rem; font-weight: 500; padding: 7px 18px; border-radius: 100px; cursor: pointer; transition: all .2s; text-decoration: none; display: flex; align-items: center; gap: 6px; }
  .btn-admin:hover { background: var(--accent); color: #000; }
  #gallery { position: relative; z-index: 1; padding: 0 32px 60px; display: grid; grid-template-columns: repeat(auto-fill, minmax(var(--card-w), 1fr)); gap: 20px; }
  .libro-card { position: relative; cursor: pointer; border-radius: var(--radius); transition: transform .25s ease; }
  .libro-card:hover { transform: translateY(-4px); }
  .libro-card .cover-wrap { position: relative; border-radius: var(--radius); overflow: hidden; aspect-ratio: 2/3; background: var(--surface); border: 1px solid var(--border); }
  .libro-card img { width: 100%; height: 100%; object-fit: cover; display: block; transition: filter .3s; }
  .libro-card.no-adquirido img { filter: grayscale(1) brightness(.5); }
  .cover-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,.88)); padding: 20px 10px 10px; }
  .badge-leido { position: absolute; top: 8px; right: 8px; font-size: .58rem; font-weight: 700; letter-spacing: .06em; padding: 3px 7px; border-radius: 4px; text-transform: uppercase; }
  .badge-leido.si  { background: var(--leido); color: #000; }
  .badge-leido.no  { background: #2a1a1a; color: var(--muted); border: 1px solid var(--border); }
  .badge-genero { position: absolute; top: 8px; left: 8px; font-size: .58rem; font-weight: 700; letter-spacing: .04em; padding: 3px 7px; border-radius: 4px; background: rgba(0,0,0,.7); color: var(--accent); border: 1px solid rgba(251,146,60,.3); }
  .libro-name { margin-top: 8px; font-size: .78rem; font-weight: 500; color: var(--text); line-height: 1.2; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .libro-autor { font-size: .68rem; color: var(--muted); text-align: center; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #modal { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.75); backdrop-filter: blur(6px); align-items: center; justify-content: center; padding: 20px; }
  #modal.open { display: flex; }
  .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; max-width: 580px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; animation: modalIn .25s ease; }
  @keyframes modalIn { from { opacity:0; transform:scale(.96) translateY(12px); } to { opacity:1; transform:scale(1) translateY(0); } }
  .modal-header { display: flex; gap: 20px; padding: 24px 24px 20px; }
  .modal-cover { width: 110px; flex-shrink: 0; border-radius: 8px; overflow: hidden; aspect-ratio: 2/3; background: var(--bg); border: 1px solid var(--border); }
  .modal-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .modal-info { flex: 1; display: flex; flex-direction: column; gap: 10px; }
  .modal-title { font-family: var(--font-head); font-size: 2rem; letter-spacing: .06em; color: var(--text); line-height: 1; }
  .modal-autor { font-size: .9rem; color: var(--muted); font-style: italic; }
  .modal-meta { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { font-size: .72rem; padding: 4px 10px; border-radius: 6px; background: var(--bg); border: 1px solid var(--border); color: var(--muted); }
  .tag.hl  { border-color: var(--accent); color: var(--accent); }
  .tag.ok  { border-color: var(--leido);  color: var(--leido); }
  .modal-close { position: absolute; top: 14px; right: 14px; background: var(--bg); border: 1px solid var(--border); color: var(--muted); width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: .9rem; display: flex; align-items: center; justify-content: center; transition: all .2s; }
  .modal-close:hover { color: var(--text); border-color: var(--text); }
  #empty-state { grid-column: 1/-1; padding: 80px 0; text-align: center; color: var(--muted); display: none; }
  @media (max-width: 600px) {
    header { padding: 28px 16px 16px; } .controls { padding: 0 16px 16px; }
    #gallery { padding: 0 16px 40px; gap: 12px; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
    .modal-header { flex-direction: column; }
  }
</style>
</head>
<body>

<nav>
  <a class="logo" href="/index.html">
    <img class="logo-icon" src="../Sol.png" alt="">
    <span>Biblioteca</span>Fabri Lsq
  </a>
  <div class="nav-links">
    <a href="/WebManga/index.html">Mangas</a>
    <a href="/WebJuegos/index.html">Juegos</a>
    <a href="/WebLibros/index.html" class="active">Libros</a>
  </div>
</nav>

<header>
  <div>
    <h1>LIB<span>ROS</span></h1>
    <p style="color:var(--muted);font-size:.85rem;margin-top:4px">Tu biblioteca literaria</p>
  </div>
  <div id="stats-bar">
    <div class="stat"><strong id="stat-total">—</strong>Libros</div>
    <div class="stat"><strong id="stat-leidos">—</strong>Leídos</div>
    <div class="stat"><strong id="stat-adquiridos">—</strong>Adquiridos</div>
  </div>
</header>

<div class="controls">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="buscador" placeholder="Buscar libro o autor..." oninput="filtrar()">
  </div>
  <div class="filter-group">
    <button class="chip active" data-filtro="todos"      onclick="setFiltro(this)">Todos</button>
    <button class="chip"        data-filtro="leido"      onclick="setFiltro(this)">Leídos</button>
    <button class="chip"        data-filtro="noleido"    onclick="setFiltro(this)">Pendientes</button>
    <button class="chip"        data-filtro="adquirido"  onclick="setFiltro(this)">Adquiridos</button>
  </div>
  <div class="filter-group">
    <button class="chip active" data-orden="titulo" onclick="setOrden(this)">A→Z</button>
    <button class="chip"        data-orden="autor"  onclick="setOrden(this)">Autor</button>
    <button class="chip"        data-orden="anio"   onclick="setOrden(this)">Año</button>
  </div>
  <a href="/admin/index.html#libros" class="btn-admin">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
    Agregar
  </a>
</div>

<div id="gallery">
  <div id="empty-state"><p>No se encontraron libros</p></div>
</div>

<div id="modal" onclick="if(event.target===this)cerrarModal()">
  <div class="modal-box">
    <button class="modal-close" onclick="cerrarModal()">✕</button>
    <div class="modal-header">
      <div class="modal-cover"><img id="modal-img" src="" alt=""></div>
      <div class="modal-info">
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-autor" id="modal-autor"></div>
        <div class="modal-meta"  id="modal-meta"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────
const API = '/.netlify/functions/airtable';

let todosLosLibros = [];
let filtroActivo   = 'todos';
let ordenActivo    = 'titulo';
const coverCache   = {};

// ── CARGA ─────────────────────────────────────────────────
async function cargarLibros() {
  mostrarSkeletons();
  let records = [], offset = null;
  try {
    do {
      let url = `${API}?table=Libros&pageSize=100&sortField=Titulo&sortDir=asc`;
      if (offset) url += `&offset=${encodeURIComponent(offset)}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`Error ${res.status}`);
      const data = await res.json();
      records = records.concat(data.records);
      offset = data.offset || null;
    } while (offset);
    todosLosLibros = records.map(r => ({ id: r.id, ...r.fields }));
    renderizar();
    actualizarStats();
  } catch(e) {
    document.getElementById('gallery').innerHTML =
      `<div style="grid-column:1/-1;padding:60px;text-align:center;color:#f87171">Error: ${e.message}</div>`;
  }
}

// ── Open Library: cover automático ───────────────────────
async function buscarCoverOpenLibrary(titulo, autor) {
  const key = titulo + autor;
  if (coverCache[key]) return coverCache[key];
  try {
    const q = encodeURIComponent(`${titulo} ${autor}`);
    const res = await fetch(`https://openlibrary.org/search.json?q=${q}&fields=cover_i&limit=1`);
    if (!res.ok) return null;
    const data = await res.json();
    const coverId = data.docs?.[0]?.cover_i;
    if (!coverId) return null;
    const url = `https://covers.openlibrary.org/b/id/${coverId}-L.jpg`;
    coverCache[key] = url;
    return url;
  } catch { return null; }
}

// ── RENDER ────────────────────────────────────────────────
function renderizar() {
  const gallery  = document.getElementById('gallery');
  const busqueda = document.getElementById('buscador').value.toLowerCase().trim();

  let lista = todosLosLibros.filter(l => {
    const titulo = (l.Titulo || '').toLowerCase();
    const autor  = (l.Autor  || '').toLowerCase();
    if (busqueda && !titulo.includes(busqueda) && !autor.includes(busqueda)) return false;
    if (filtroActivo === 'leido')     return l.Leido;
    if (filtroActivo === 'noleido')   return !l.Leido;
    if (filtroActivo === 'adquirido') return l.Adquirido;
    return true;
  });

  lista.sort((a, b) => {
    if (ordenActivo === 'titulo') return (a.Titulo||'').localeCompare(b.Titulo||'');
    if (ordenActivo === 'autor')  return (a.Autor||'').localeCompare(b.Autor||'');
    if (ordenActivo === 'anio')   return (b.Anio||0) - (a.Anio||0);
    return 0;
  });

  gallery.innerHTML = '';

  if (lista.length === 0) {
    const e = document.createElement('div');
    e.style.cssText = 'grid-column:1/-1;padding:80px 0;text-align:center;color:var(--muted)';
    e.innerHTML = '<p>No se encontraron libros</p>';
    gallery.appendChild(e); return;
  }

  lista.forEach(libro => {
    const card = crearCard(libro);
    gallery.appendChild(card);
    if (libro.CoverURL) {
      card.querySelector('img').src = libro.CoverURL;
    } else {
      buscarCoverOpenLibrary(libro.Titulo, libro.Autor || '').then(url => {
        if (url) {
          card.querySelector('img').src = url;
          libro.CoverURL = url;
          actualizarCover(libro.id, url);
        }
      });
    }
  });
}

function crearCard(l) {
  const card = document.createElement('div');
  card.className = `libro-card${l.Adquirido ? '' : ' no-adquirido'}`;
  card.onclick = () => abrirModal(l);
  card.innerHTML = `
    <div class="cover-wrap">
      <img src="" alt="${l.Titulo}" loading="lazy">
      ${l.Genero ? `<div class="badge-genero">${l.Genero}</div>` : ''}
      <div class="badge-leido ${l.Leido ? 'si' : 'no'}">${l.Leido ? 'Leído' : 'Pendiente'}</div>
      <div class="cover-overlay"></div>
    </div>
    <div class="libro-name">${l.Titulo || ''}</div>
    <div class="libro-autor">${l.Autor || ''}</div>
  `;
  return card;
}

// ── MODAL ─────────────────────────────────────────────────
function abrirModal(l) {
  document.getElementById('modal-img').src    = l.CoverURL || '';
  document.getElementById('modal-title').textContent = l.Titulo || '';
  document.getElementById('modal-autor').textContent = l.Autor  || '';
  document.getElementById('modal-meta').innerHTML = [
    l.Genero     ? `<span class="tag hl">${l.Genero}</span>`         : '',
    l.Anio       ? `<span class="tag">${l.Anio}</span>`               : '',
    l.Leido      ? `<span class="tag ok">✓ Leído</span>`             : '<span class="tag">Pendiente</span>',
    l.Adquirido  ? `<span class="tag ok">Adquirido</span>`           : '<span class="tag">No adquirido</span>',
  ].join('');
  document.getElementById('modal').classList.add('open');
  document.addEventListener('keydown', escModal);
}
function cerrarModal() {
  document.getElementById('modal').classList.remove('open');
  document.removeEventListener('keydown', escModal);
}
function escModal(e) { if (e.key === 'Escape') cerrarModal(); }

// ── FILTROS ───────────────────────────────────────────────
function setFiltro(btn) {
  document.querySelectorAll('[data-filtro]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); filtroActivo = btn.dataset.filtro; renderizar();
}
function setOrden(btn) {
  document.querySelectorAll('[data-orden]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); ordenActivo = btn.dataset.orden; renderizar();
}
function filtrar() { renderizar(); }

// ── STATS ─────────────────────────────────────────────────
function actualizarStats() {
  document.getElementById('stat-total').textContent     = todosLosLibros.length;
  document.getElementById('stat-leidos').textContent    = todosLosLibros.filter(l => l.Leido).length;
  document.getElementById('stat-adquiridos').textContent = todosLosLibros.filter(l => l.Adquirido).length;
}

// ── HELPERS ───────────────────────────────────────────────
function mostrarSkeletons() {
  const g = document.getElementById('gallery');
  g.innerHTML = Array(12).fill(`<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);aspect-ratio:2/3;animation:pulse 1.5s ease-in-out infinite"></div>`).join('');
  if (!document.querySelector('style[data-pulse]')) {
    const s = document.createElement('style');
    s.dataset.pulse = '1';
    s.textContent = '@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}';
    document.head.appendChild(s);
  }
}
async function actualizarCover(id, url) {
  try {
    await fetch(`${API}?table=Libros&id=${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fields: { CoverURL: url } })
    });
  } catch {}
}

cargarLibros();
</script>
</body>
</html>
