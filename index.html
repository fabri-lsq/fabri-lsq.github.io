<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fabrilib — Biblioteca Virtual</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .logo-icon {
    width: 28px;
    height: 28px;
    object-fit: contain;
  }

  :root {
    --bg: #0e0e12; --surface: #16161d; --border: #2a2a38;
    --accent: #c084fc; --accent2: #818cf8;
    --text: #e2e2f0; --muted: #6b6b8a;
    --font-head: 'Bebas Neue', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }

  body {
    background: var(--bg); color: var(--text);
    font-family: var(--font-body); min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px 24px;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 70% 60% at 20% 20%, rgba(192,132,252,.08) 0%, transparent 60%),
      radial-gradient(ellipse 50% 70% at 80% 80%, rgba(129,140,248,.06) 0%, transparent 60%);
    pointer-events: none;
  }

  .hero {
    text-align: center; margin-bottom: 56px; position: relative; z-index: 1;
  }

  .hero-logo {
    font-family: var(--font-head);
    font-size: clamp(3.5rem, 10vw, 5rem);
    letter-spacing: .08em; line-height: 1;
    color: var(--text);
  }

  .hero-logo span { color: var(--accent); }

  .hero-sub {
    color: var(--muted); font-size: .9rem; font-weight: 300;
    margin-top: 10px; letter-spacing: .08em; text-transform: uppercase;
  }

  .cards {
    display: flex; gap: 24px; flex-wrap: wrap; justify-content: center;
    position: relative; z-index: 1;
  }

  .card {
    text-decoration: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 48px;
    width: 260px;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
    transition: transform .3s ease, border-color .3s ease, box-shadow .3s ease;
    position: relative; overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute; inset: 0;
    opacity: 0; transition: opacity .3s;
  }

  .card.manga::before  { background: radial-gradient(circle at 50% 0%, rgba(192,132,252,.15), transparent 70%); }
  .card.juegos::before { background: radial-gradient(circle at 50% 0%, rgba(129,140,248,.15), transparent 70%); }

  .card:hover {
    transform: translateY(-8px);
    box-shadow: 0 20px 60px rgba(0,0,0,.4);
  }

  .card.manga:hover  { border-color: var(--accent); }
  .card.juegos:hover { border-color: var(--accent2); }
  .card:hover::before { opacity: 1; }

  .card-icon-mangas {
    width: 3rem;
    height: 3rem;
    object-fit: contain;
    filter: drop-shadow(0 0 20px rgba(192,132,252,.4));
  }

  .card-icon {
    font-size: 3rem; line-height: 1;
    filter: drop-shadow(0 0 20px rgba(192,132,252,.4));
  }

  .card-title {
    font-family: var(--font-head);
    font-size: 2rem; letter-spacing: .08em;
    color: var(--text);
  }

  .card.manga  .card-title { color: var(--accent); }
  .card.juegos .card-title { color: var(--accent2); }

  .card-desc {
    font-size: .8rem; color: var(--muted); text-align: center;
    line-height: 1.5; font-weight: 300;
  }

  .card-arrow {
    margin-top: 8px;
    font-size: .75rem; color: var(--muted);
    letter-spacing: .1em; text-transform: uppercase;
    transition: color .2s;
  }

  .card.manga:hover  .card-arrow { color: var(--accent); }
  .card.juegos:hover .card-arrow { color: var(--accent2); }

  .footer {
    position: fixed; bottom: 20px;
    font-size: .72rem; color: var(--muted); letter-spacing: .05em;
    z-index: 1;
  }

  @media (max-width: 500px) {
    .card { width: 100%; max-width: 320px; padding: 32px 32px; }
    body { overflow: auto; }
  }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-logo"><span>Biblioteca</span><br>Fabri Lsq</div>
  <p class="hero-sub">Biblioteca Virtual Personal</p>
</div>

<div class="cards">
  <a href="/WebManga/index.html" class="card manga">
    <img src="/WebManga/Sol.ico" class="card-icon-mangas">
    <div class="card-title">MANGAS</div>
    <p class="card-desc">Tu colección de mangas físicos,<br>progreso por serie y estado editorial.</p>
    <div class="card-arrow">Explorar →</div>
  </a>

  <a href="/WebJuegos/index.html" class="card juegos">
    <div class="card-icon">🎮</div>
    <div class="card-title">JUEGOS</div>
    <p class="card-desc">Biblioteca de juegos por plataforma,<br>horas jugadas y logros.</p>
    <div class="card-arrow">Explorar →</div>
  </a>
</div>

<p class="footer">fabri-lsq.github.io</p>

</body>
</html>
